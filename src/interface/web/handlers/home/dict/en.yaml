features:
  title: New Items
  description: Discover our new specialties that make every occasion magical.
  items:
    - title: Avocado-Salmon Flat Croissant
      description: The meeting of fresh avocado and smoked salmon in a crispy croissant offers a mouth-watering taste experience.
      image: /static/img/image_67534337.webp
    - title: Walnut-Blueberry Camembert Flat Croissant
      description: The walnut-blueberry camembert flat croissant is a special sandwich that combines the creaminess of camembert cheese with the freshness of blueberries and the crunchiness of walnuts.
      image: /static/img/IMG_3252.webp
    - title: Walnut and Poppy Seed Beigli
      description: Walnut and poppy seed beigli are traditional Christmas cakes made with rich fillings. Excellent for festive occasions.
      image: /static/img/IMG_3368.webp
