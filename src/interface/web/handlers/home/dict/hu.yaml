features:
  title: Újdonságok
  description: Fedezd fel új ételkülönlegességeinket, amelyek minden alkalmat varázslatossá tesznek.
  items:
    - title: Avokádós-Lazacos lapos croi
      description: Friss avokádó és füstölt lazac találkozása a ropogós croissantban egy ínycsiklandó ízélményt nyújt.
      image: /static/img/image_67534337.webp
    - title: Diós-Áfonyás camembert lapos croi
      description: A diós-áfonyás camembert lapos croissant különleges szendvics, amely a camembert sajt krémességét ötvözi az áfonya frissességével és a dió ropogósságával.
      image: /static/img/IMG_3252.webp
    - title: Diós és Mákos Bejglik
      description: A diós és mákos bejgli gazdag töltelékkel készülő hagyományos karácsonyi sütemények. Kiválóak ünnepi alkalmakra.
      image: /static/img/IMG_3368.webp
about:
  title: Zümmögő
  subtitle: Ismerj meg minket
  text: Fedezze fel étlapunk különleges kínálatát, ahol a friss alapanyagok és a kreatív ízek találkoznak. Engedje, hogy elkalauzoljuk egy kulináris utazásra, amely minden érzékét elvarázsolja.
  link: /hu/about
  link_text: Rólunk
testimonial:
  title: Rólunk mondták
  items:
    - quote: "Reggelizőt kerestem a közelben és megakadtam a szemem a helyen a térképen..."
      author: Kopócs Kata
      rating: 5
    - quote: "A kávé ízletes, ahogy a szendvicsek is finomak..."
      author: Nagy Dávid
      rating: 5
    - quote: "Nagyon finom volt a Falafeles wrap..."
      author: Németh Szidónia
      rating: 5
    - quote: "Nagyon hangulatos hely, a kiszolgálás mindig kedves..."
      author: Oláh Zsanett
      rating: 5
    - quote: "Többször vásároltam már kenyeret, peksutit, kvet..."
      author: Jakus Mária
      rating: 5
    - quote: "Finom a kávé, van rengeteg sös és édes péksüti..."
      author: Kökényessyné Takács Mária
      rating: 5
