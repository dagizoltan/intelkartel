sections:
  - title: Wraps
    items:
      - name: Pulled Duck
        price: 2890 Ft
        description: Juicy, tender pulled roast duck with special plum jam mustard. Filled with fresh arugula and crunchy cucumber, wrapped in tortilla - a harmony of sweet, spicy and full flavors.
        image: /static/img/68c3df7642da1c20b8c3ae3c.webp
      - name: Avocado-Salmon
        price: 3190 Ft
        description: Silky avocado cream, premium smoked salmon and fresh arugula meet in a light tortilla. Cucumber slices and pickled red onion ensure freshness, while roasted sunflower seeds add crunchy texture. A true gourmet, refreshing and nutritious choice.
        image: /static/img/68c3df7142da1c20b8c3ae37_masolata.webp
      - name: Sun-dried Tomato & Egg
        price: 2390 Ft
        description: Fresh, Mediterranean flavors in a light yet filling wrap. Soft tortilla filled with creamy hummus, boiled egg, baby spinach and crumbled feta. Sun-dried tomato with its oil and cayenne spice gives it an intense, slightly spicy character. A healthy, flavor-rich choice if you want something fresh and special.
        image: /static/img/68c3df7142da1c20b8c3ae39.webp
      - name: Falafel
        price: 2290 Ft
        description: Crispy falafel, fresh lettuce leaves, Hungarian tomato and cucumber meet creamy tahini dressing. Pickled red onion and pomegranate add extra freshness and exciting flavor to every bite. A light yet filling choice for any time of day!
        image: /static/img/68c3df7642da1c20b8c3ae3f_1.webp
  - title: Sandwiches / Salad Boxes
    items:
      - name: Prosciutto-Cheese Ciabatta
        price: 2590 Ft
        description: Crispy ciabatta filled with silky brie cheese and delicious prosciutto ham. Dried tomato and fresh arugula leaves enrich the taste experience, so every bite offers Mediterranean harmony. A filling yet light choice for any meal.
      - name: Caprese Ciabatta
        price: 2390 Ft
        description: Italian classic reimagined... crispy ciabatta meets soft mozzarella, ripe tomato and fresh basil leaf. Pesto and balsamic vinegar complete this Mediterranean taste experience. A light, refreshing and always timeless choice.
      - name: Chicken-Pesto Ciabatta
        price: 2490 Ft
        description: Grilled chicken breast filled in crispy ciabatta, creamy pesto and melted Edam cheese. Fresh tomato, arugula leaves and intense flavored dried tomato make this Mediterranean-style sandwich rich. A filling yet light choice for any meal.
      - name: Avocado Cream Box
        price: 2490 Ft
        description: Fresh lollo lettuce, sliced egg, tomato and cucumber freshness meets silky avocado cream. Served with crispy ciabatta slices, a light, nutritious and delicious choice for any time of day.
      - name: Egg Cream Box
        price: 2590 Ft
        description: Fresh lollo lettuce, avocado slices, tomato and cucumber freshness meets silky egg cream. Served with crispy ciabatta slices, a light, nutritious and delicious choice for any time of day.
