hero:
  title: About IntelKartel
  subtitle: Who We Are
  short_summary: We are a collective of analysts, operatives, and cynics. We don't just report news; we decode it.
  summary: Born from the need for truth in a world of deception, IntelKartel brings together experts from intelligence, cyber, and military backgrounds. We operate in the shadows to bring light to the complex machinations of global power. Trust no one, verify everything.
  buttons:
    - text: Contact Us
      link: /contact
      type: primary
content:
  - "IntelKartel was founded on the principle that information is the most valuable currency in the modern world. We are not journalists; we are analysts, hackers, and former intelligence officers who understand how the game is played."
spirit:
  title: Our Philosophy
  subtitle: "Trust No One"
  text:
    - "In a world drowning in misinformation and propaganda, skepticism is a survival skill. We question narratives, scrutinize sources, and follow the money. Our loyalty is to the truth, however uncomfortable it may be."
    - "We operate with a simple mandate: uncover what is hidden. Whether it's state-sponsored cyber espionage or corporate malfeasance, we shine a light on the dark corners of the global stage."
discover:
  title: Join the Mission
  text: "We are always looking for like-minded individuals who share our passion for truth and our cynical sense of humor. If you have skills in analysis, coding, or tradecraft, reach out. But be warned: once you see the world through our eyes, there is no going back."
