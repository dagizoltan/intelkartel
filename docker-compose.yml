version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - R2_ENDPOINT=http://minio:9000
      - R2_ACCESS_KEY_ID=minioadmin
      - SECRET_ACCESS_KEY=minioadmin
      - R2_BUCKET_NAME=intelkartel-media
    depends_on:
      - minio

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/intelkartel-media --ignore-existing;
      /usr/bin/mc anonymous set public myminio/intelkartel-media;
      "

volumes:
  minio_data:
