title: "Allegations of a Kéj Gyilkos Network in Hungary"
subtitle: "An Examination of Public Panic, LGBTI+ Prejudice, and the Obligation to Investigate Unverified Claims"
summary: "This article delves into the unverified rumors circulating online regarding a 'kéj gyilkos' network allegedly conducting contract killings of gay men to help perpetrators avoid prison. It argues that while these lurid claims lack verified proof, Hungary's official hostility towards LGBTI+ minorities makes them dangerously plausible, necessitating a transparent, forensic, and evidence-driven inquiry by the state."
