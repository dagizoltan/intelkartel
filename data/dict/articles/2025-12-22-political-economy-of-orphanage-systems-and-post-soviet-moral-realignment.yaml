title: "Political Economy of Orphanage Systems and Post-Soviet Moral Realignment"
subtitle: "An Economic Evaluation of Institutionalized Social Control, Criminal Networks, and Hungary's Shift Toward Family-Based Care"
summary: "This article evaluates the legacy of large-scale orphanage systems in post-Soviet economies, explaining how these environments bred criminal norms and moral hazard. It frames Hungary's recent transition from institutional mass upbringing to family-based care as an economically inefficient but morally durable realignment, cultivating social trust over coercion."
