title: "The Anatomy of a Technological Scare and Governance Failure"
subtitle: "How Misinterpreted American Patents, Existential Fear, and State Silence Collide in Hungary"
summary: "This article examines a circulating catalogue of real but misinterpreted American patents—concerning microwave auditory effects, directed energy, and brain-wave induction—used to justify conspiracy theories of neurological warfare in Hungary. It argues that this technological panic persists because the government responds to genuine citizen distress with silence and opacity, rather than transparency and independent scientific review."
