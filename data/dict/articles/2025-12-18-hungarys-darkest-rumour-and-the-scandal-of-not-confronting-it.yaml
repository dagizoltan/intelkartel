title: "Hungary's Darkest Rumour and the Scandal of Not Confronting It"
subtitle: "An In-Depth Look into the Clandestine Kéj Gyilkos Murder-for-Hire Claims and the State's Silence"
summary: "This report investigates the explosive, unverified claims of a clandestine 'kéj gyilkos' network in Hungary operating to murder gay men for payment to shield perpetrators from justice. Noting the state's historical rhetoric against sexual minorities, it argues that the failure to investigate these rumors with full transparency and forensic rigor constitutes a profound scandal in itself, fostering fear and vigilantism."
