title: Applying R2P to Prevent Genocide on the Ukraine-Hungary Border
subtitle: Strategic Intelligence Analysis on Protecting Roma Communities
summary: A strategic military intelligence analysis detailing the escalating ethnic
  violence against Roma communities along the Ukraine-Hungary border. The report explores
  the potential invocation of the Responsibility to Protect (R2P) doctrine by the
  UN and NATO to intervene and prevent genocide.
