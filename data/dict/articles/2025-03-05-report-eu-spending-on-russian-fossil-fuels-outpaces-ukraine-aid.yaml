title: 'Report: EU Spending on Russian Fossil Fuels Outpaces Ukraine Aid'
subtitle: CREA Analysis Highlights the Financial Reality of Energy Exports
summary: A brief overview of a report by the Centre for Research on Energy and Clean
  Air (CREA) revealing that EU imports of Russian fossil fuels have surpassed the
  financial and military aid sent to Ukraine. The summary details how Russia generated
  $254 billion from energy exports globally.
