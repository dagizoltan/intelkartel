title: Alleged Electromagnetic Influence Ops and Narcotics Syndicates
subtitle: Field report examining rumors of joint activity between foreign operatives
  and Afghan heroin networks.
summary: An unclassified alleged field report analyzing rumors of interactions between
  field operatives and narcotics syndicates in Afghanistan. The report investigates
  claims of experimental electromagnetic warfare, sub-audible 'skull-phones', and
  psychological coercion, assessing them primarily as info-environment hazards and
  paranoia markers while recommending continued HUMINT monitoring.
