title: FBI Confidential Informant Earnings Exposed
subtitle: Unsealed Records Reveal Lucrative Payouts for Undercover Work
summary: Newly unsealed court records disclose that a confidential informant earned
  over $665,000 working for the FBI over eight years, including assignments posing
  as a terrorist. The article highlights the significant financial incentives involved
  in federal intelligence operations.
